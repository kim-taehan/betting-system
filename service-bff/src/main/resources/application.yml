spring:
  application:
    name: bff-service
  grpc:
    client:
      channels:
        event:
          address: "static://localhost:9091"
          negotiation-type: plaintext
        betting:
          address: "static://localhost:9092"
          negotiation-type: plaintext
        wallet:
          address: "static://localhost:9094"
          negotiation-type: plaintext

server:
  port: 8086  # 호스트 8080 점유 → 8086 (BFF 진입점)

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
