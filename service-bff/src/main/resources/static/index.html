<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>⚽ Betting</title>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --line: #334155; --text: #e2e8f0;
      --muted: #94a3b8; --accent: #38bdf8; --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); }
    header { position: sticky; top: 0; background: rgba(15,23,42,.92); backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--line); padding: 14px 20px; display: flex; flex-wrap: wrap;
      align-items: center; gap: 14px; }
    header h1 { font-size: 18px; margin: 0; margin-right: auto; }
    header label { font-size: 13px; color: var(--muted); }
    select, input { background: var(--card); color: var(--text); border: 1px solid var(--line);
      border-radius: 8px; padding: 7px 10px; font-size: 14px; }
    input { width: 90px; }
    .balance { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
      padding: 8px 14px; font-weight: 600; }
    .balance span { color: var(--green); }
    main { max-width: 980px; margin: 0 auto; padding: 20px; display: grid; gap: 24px;
      grid-template-columns: 1fr; }
    @media (min-width: 820px) { main { grid-template-columns: 1.3fr 1fr; } }
    h2 { font-size: 15px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
      margin: 0 0 12px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 16px; margin-bottom: 14px; }
    .ev-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .ev-head strong { font-size: 15px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line);
      color: var(--muted); }
    .badge.SCHEDULED { color: var(--accent); border-color: var(--accent); }
    .badge.SETTLED { color: var(--muted); }
    .mkt { color: var(--muted); font-size: 12px; margin: 6px 0; }
    .sels { display: flex; gap: 8px; flex-wrap: wrap; }
    .sel { flex: 1 1 90px; background: #0b1220; border: 1px solid var(--line); border-radius: 10px;
      padding: 10px; cursor: pointer; text-align: center; transition: .12s; }
    .sel:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-1px); }
    .sel:disabled { opacity: .45; cursor: default; }
    .sel .name { font-size: 12px; color: var(--muted); }
    .sel .odds { font-size: 17px; font-weight: 700; color: var(--accent); }
    .bet { display: flex; justify-content: space-between; align-items: center; padding: 10px 0;
      border-bottom: 1px solid var(--line); font-size: 14px; }
    .bet:last-child { border-bottom: none; }
    .bet .st { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
    .st.PENDING { background: rgba(245,158,11,.15); color: var(--amber); }
    .st.WON { background: rgba(34,197,94,.15); color: var(--green); }
    .st.LOST { background: rgba(239,68,68,.15); color: var(--red); }
    .muted { color: var(--muted); font-size: 13px; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 12px 18px;
      opacity: 0; transition: .25s; pointer-events: none; max-width: 90%; }
    #toast.show { opacity: 1; }
    #toast.err { border-color: var(--red); color: #fecaca; }
    #toast.ok { border-color: var(--green); color: #bbf7d0; }
  </style>
</head>
<body>
  <header>
    <h1>⚽ Betting</h1>
    <label>유저 <select id="user"><option>u1</option><option>u2</option></select></label>
    <label>스테이크 <input id="stake" type="number" value="5000" min="100" step="100"></label>
    <div class="balance">잔액 <span id="balance">—</span></div>
  </header>

  <main>
    <section>
      <h2>경기 / 배당</h2>
      <div id="events"><p class="muted">불러오는 중…</p></div>
    </section>
    <section>
      <h2>내 베팅</h2>
      <div id="bets" class="card"><p class="muted">불러오는 중…</p></div>
    </section>
  </main>

  <div id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const won = (m) => m ? Number(m.amountMinor).toLocaleString() + '원' : '—';

    function toast(msg, kind) {
      const t = $('toast');
      t.textContent = msg;
      t.className = 'show ' + (kind || '');
      setTimeout(() => t.className = '', 2600);
    }

    async function load() {
      const user = $('user').value;
      const res = await fetch(`/api/dashboard?userId=${user}`);
      const d = await res.json();
      $('balance').textContent = won(d.balance);
      renderEvents(d.events);
      renderBets(d.bets);
    }

    function renderEvents(events) {
      $('events').innerHTML = events.map(ev => `
        <div class="card">
          <div class="ev-head">
            <strong>${ev.name}</strong>
            <span class="badge ${ev.status}">${ev.status}</span>
          </div>
          ${ev.markets.map(mk => `
            <div class="mkt">${mk.name}</div>
            <div class="sels">
              ${mk.selections.map(s => `
                <button class="sel" ${ev.status !== 'SCHEDULED' ? 'disabled' : ''}
                  onclick="bet('${ev.id}','${mk.id}','${s.id}')">
                  <div class="name">${s.name}</div>
                  <div class="odds">${s.odds.toFixed(2)}</div>
                </button>`).join('')}
            </div>`).join('')}
        </div>`).join('');
    }

    function renderBets(bets) {
      if (!bets.length) { $('bets').innerHTML = '<p class="muted">아직 베팅이 없습니다.</p>'; return; }
      $('bets').innerHTML = bets.map(b => `
        <div class="bet">
          <div>
            <div>${b.selectionId} · 배당 ${b.odds.toFixed(2)}</div>
            <div class="muted">스테이크 ${won(b.stake)}${b.status === 'WON' ? ' · 당첨 ' + won(b.payout) : ''}</div>
          </div>
          <span class="st ${b.status}">${b.status}</span>
        </div>`).join('');
    }

    async function bet(eventId, marketId, selectionId) {
      const body = {
        userId: $('user').value, eventId, marketId, selectionId,
        stakeMinor: Number($('stake').value)
      };
      const res = await fetch('/api/bets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
      if (res.ok) {
        toast('베팅 접수 완료 ✅', 'ok');
        load();
      } else {
        const err = await res.json().catch(() => ({ message: 'error' }));
        toast('베팅 실패: ' + err.message, 'err');
      }
    }

    $('user').onchange = load;
    load();
  </script>
</body>
</html>
