syntax = "proto3";

package betting.ops.v1;

option java_multiple_files = true;
option java_package = "com.example.betting.proto.ops.v1";
option java_outer_classname = "OpsProto";

message ServiceStatus {
  string name = 1;
  string status = 2;   // SERVING / NOT_SERVING / UNKNOWN
}

message GetSystemStatusRequest {}

message GetSystemStatusResponse {
  repeated ServiceStatus services = 1;
  int64 bets_placed = 2;
  int64 bets_settled = 3;
  int64 bets_won = 4;
  int64 bets_lost = 5;
  int64 total_staked_minor = 6;
  int64 total_payout_minor = 7;
  int64 risk_alerts = 8;
}

message Alert {
  string type = 1;
  string subject_id = 2;
  string message = 3;
  int64 timestamp_epoch_ms = 4;
}

message ListAlertsRequest {
  int32 limit = 1;     // 0 이면 기본값
}

message ListAlertsResponse {
  repeated Alert alerts = 1;
}

service OpsService {
  rpc GetSystemStatus(GetSystemStatusRequest) returns (GetSystemStatusResponse);
  rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse);
}
