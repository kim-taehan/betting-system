syntax = "proto3";

package betting.event.v1;

option java_multiple_files = true;
option java_package = "com.example.betting.proto.event.v1";
option java_outer_classname = "EventProto";

// 경기(Event) = 스포츠 매치. 하나의 경기는 여러 마켓을 가진다.
message Event {
  string id = 1;
  string name = 2;              // "Team A vs Team B"
  string sport = 3;             // "SOCCER"
  EventStatus status = 4;
  int64 start_time_epoch_ms = 5;
  repeated Market markets = 6;
}

enum EventStatus {
  EVENT_STATUS_UNSPECIFIED = 0;
  SCHEDULED = 1;
  LIVE = 2;
  SETTLED = 3;
}

// 마켓 = 베팅 대상 종류. 예: "1X2"(승무패)
message Market {
  string id = 1;
  string name = 2;
  repeated Selection selections = 3;
}

// 셀렉션 = 마켓 내 선택지. 예: HOME / DRAW / AWAY, 각자 배당(decimal odds)
message Selection {
  string id = 1;
  string name = 2;
  double odds = 3;              // decimal odds, 예: 1.85
}

message ListEventsRequest {
  // UNSPECIFIED = 전체
  EventStatus status = 1;
}

message ListEventsResponse {
  repeated Event events = 1;
}

message GetOddsRequest {
  string event_id = 1;
}

message GetOddsResponse {
  Event event = 1;
}

message StreamOddsRequest {
  // 비어 있으면 전체 경기의 배당 변동을 스트리밍
  string event_id = 1;
}

// 배당 변동 1건
message OddsUpdate {
  string event_id = 1;
  string market_id = 2;
  string selection_id = 3;
  double odds = 4;
  int64 timestamp_epoch_ms = 5;
}

service EventService {
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc GetOdds(GetOddsRequest) returns (GetOddsResponse);
  // server-streaming: 배당 변동을 계속 밀어준다
  rpc StreamOdds(StreamOddsRequest) returns (stream OddsUpdate);
}
