# 학습용 스포츠 베팅 시스템 인프라.
# 애플리케이션 서비스는 호스트에서 Gradle(bootRun)로 실행하고, 여기서는 인프라만 띄운다.
# 호스트 서비스 → Kafka: localhost:19092, → OTel Collector: localhost:4317
# 컨테이너 → 호스트 서비스(Prometheus 스크레이프): host.docker.internal

services:
  postgres:
    image: postgres:17
    container_name: betting-postgres
    environment:
      POSTGRES_USER: betting
      POSTGRES_PASSWORD: betting
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"  # 호스트 5432는 다른 Postgres가 점유 → 15432로 노출
    volumes:
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betting"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: betting-kafka
    ports:
      - "19092:19092"  # 호스트 클라이언트용 (localhost:19092)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: betting-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: betting-grafana
    ports:
      - "3001:3000"  # 호스트 3000 점유 → 3001로 노출
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: betting-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: betting-otel-collector
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC (호스트 서비스 → 여기로 전송)
      - "4318:4318"  # OTLP HTTP
    depends_on:
      - jaeger

volumes:
  pgdata:
  grafana-data:
